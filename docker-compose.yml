version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signal-generator-app
    restart: always
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      - mongodb
      - redis
      - vectorbt-service
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://mongodb:27017/signalgenerator
      - REDIS_URL=redis://redis:6379
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - OpenAiApiKey=${OpenAiApiKey}

  vectorbt-service:
    build:
      context: ./scratch/vectorbt
      dockerfile: Dockerfile
    container_name: signal-generator-vectorbt
    restart: always
    ports:
      - "127.0.0.1:8001:8000"

  mongodb:
    image: mongo:6.0
    container_name: signal-generator-mongodb
    restart: always
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: signal-generator-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: signal-generator-prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: signal-generator-grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  loki:
    image: grafana/loki:latest
    container_name: signal-generator-loki
    restart: always
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:latest
    container_name: signal-generator-promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  alertmanager:
    image: prom/alertmanager:latest
    container_name: signal-generator-alertmanager
    restart: always
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

volumes:
  mongodb_data:
  redis_data:

networks:
  default:
    name: medusa_default
    external: true

