version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signal-generator-app
    restart: always
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://mongodb:27017/signalgenerator
      - REDIS_URL=redis://redis:6379
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - OpenAiApiKey=${OpenAiApiKey}

  mongodb:
    image: mongo:6.0
    container_name: signal-generator-mongodb
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: signal-generator-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
