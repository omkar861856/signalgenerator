global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  # - "alert.rules"

scrape_configs:
  - job_name: "signal-generator-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3005", "host.docker.internal:3005"]

  - job_name: "vectorbt-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["vectorbt-service:8000", "host.docker.internal:8000"]
