name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /root/SignalGenerator
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            rm -rf /root/SignalGenerator/public
            docker cp signal-generator-app:/usr/src/app/public /root/SignalGenerator/public
            echo "=== DIAGNOSTICS ==="
            echo "--- docker ps ---"
            docker ps
            echo "--- node processes ---"
            ps aux | grep node || true
            echo "--- port bindings ---"
            ss -tulnp || netstat -tulnp || true
            echo "--- pm2 status ---"
            pm2 status || pm2 list || true
            if command -v pm2 &> /dev/null; then
              echo "--- PM2 detected, restarting all ---"
              pm2 restart all || true
            fi
            docker system prune -f
