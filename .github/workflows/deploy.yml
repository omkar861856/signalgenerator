name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /root/SignalGenerator
            git fetch --all
            git reset --hard origin/main
            mkdir -p /root/SignalGenerator/public
            echo "=== DIAGNOSTICS ===" > /root/SignalGenerator/public/diagnostics.txt
            echo "--- docker compose build output ---" >> /root/SignalGenerator/public/diagnostics.txt
            docker compose up -d --build >> /root/SignalGenerator/public/diagnostics.txt 2>&1 || true
            rm -rf /root/SignalGenerator/public
            docker cp signal-generator-app:/usr/src/app/public /root/SignalGenerator/public || true
            echo "--- docker ps ---" >> /root/SignalGenerator/public/diagnostics.txt
            docker ps >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            echo "--- node processes ---" >> /root/SignalGenerator/public/diagnostics.txt
            ps aux | grep node >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            echo "--- port bindings ---" >> /root/SignalGenerator/public/diagnostics.txt
            (ss -tulnp || netstat -tulnp) >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            echo "--- pm2 status ---" >> /root/SignalGenerator/public/diagnostics.txt
            (pm2 status || pm2 list) >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            echo "--- nginx config ---" >> /root/SignalGenerator/public/diagnostics.txt
            cat /etc/nginx/sites-enabled/* >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            cat /etc/nginx/nginx.conf >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            if command -v pm2 &> /dev/null; then
              echo "--- PM2 detected, restarting all ---" >> /root/SignalGenerator/public/diagnostics.txt
              pm2 restart all >> /root/SignalGenerator/public/diagnostics.txt 2>&1
            fi
            curl -d "$(cat /root/SignalGenerator/public/diagnostics.txt)" ntfy.sh/signalgenerator_diagnostics_omkar || true
            docker system prune -f
